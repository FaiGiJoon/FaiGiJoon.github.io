---
---
<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
    <title>{{ page.title }} - Casper Klootwijk</title>
    <style>
        .prose h2 { font-size: 1.875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #6366f1; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.75; color: #cbd5e1; }
    </style>
</head>
<body class="bg-darker text-gray-100 overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 glass transition-all duration-300" id="navbar">
        {% include nav.html %}
    </nav>

    <main class="pt-32 pb-24">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-12">
                <a href="{{ site.baseurl }}/blog.html" class="flex items-center gap-2 text-primary hover:gap-1 transition-all mb-8">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Blog
                </a>
                <span class="px-3 py-1 bg-primary/10 rounded-full text-xs text-primary font-mono">{{ page.date | date: "%B %d, %Y" }}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-4 mb-6">{{ page.title }}</h1>
            </div>

            <div class="glass-card rounded-2xl p-8 md:p-12 prose max-w-none">
                {{ content }}
            </div>
        </div>
    </main>

    <footer class="py-8 border-t border-white/10">
        {% include footer.html %}
    </footer>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
