<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>{{ page.title }} - Casper Klootwijk</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f172a',
                        darker: '#020617'
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .prose h2 { font-size: 1.875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #6366f1; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.75; color: #cbd5e1; }
    </style>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/extra.css">
</head>
<body class="bg-darker text-gray-100 overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="{{ site.baseurl }}/index.html" class="text-xl font-bold gradient-text">Portfolio</a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="{{ site.baseurl }}/index.html#home" class="nav-link text-sm font-medium hover:text-primary transition-colors">Home</a>
                    <a href="{{ site.baseurl }}/index.html#about" class="nav-link text-sm font-medium hover:text-primary transition-colors">About</a>
                    <a href="{{ site.baseurl }}/index.html#skills" class="nav-link text-sm font-medium hover:text-primary transition-colors">Skills</a>
                    <a href="{{ site.baseurl }}/index.html#experience" class="nav-link text-sm font-medium hover:text-primary transition-colors">Experience</a>
                    <a href="{{ site.baseurl }}/blog.html" class="nav-link text-sm font-medium text-primary transition-colors">Blog</a>
                    <a href="{{ site.baseurl }}/index.html#contact" class="px-4 py-2 bg-gradient-to-r from-primary to-secondary rounded-lg text-sm font-medium hover:shadow-lg hover:shadow-primary/25 transition-all">Contact</a>
                </div>

                <!-- Mobile Menu Button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-12">
                <a href="{{ site.baseurl }}/blog.html" class="flex items-center gap-2 text-primary hover:gap-1 transition-all mb-8">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Blog
                </a>
                <span class="px-3 py-1 bg-primary/10 rounded-full text-xs text-primary font-mono">{{ page.date | date: "%B %d, %Y" }}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-4 mb-6">{{ page.title }}</h1>
            </div>

            <div class="glass-card rounded-2xl p-8 md:p-12 prose max-w-none">
                {{ content }}
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 border-t border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-gray-400 text-sm">
                    © 2026. Casper Klootwijk All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
